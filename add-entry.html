<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Dark mode applied immediately to prevent flash -->
    <script>
        (function() {
            const s = JSON.parse(localStorage.getItem("vaultSettings") || "{}");
            const appearance = s.appearance || (s.lightMode ? "light" : "dark");
            if (appearance === "dark") document.documentElement.classList.add("dark");
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureVault — Add Entry</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23000'/%3E%3Crect x='10' y='10' width='12' height='12' fill='%23C7F100'/%3E%3C/svg%3E">
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#000000">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<a href="#main-content" class="skip-to-content">Skip to content</a>

<header>
    <div class="logo">■ Securevault</div>
    <nav class="menu">
        <a href="vault.html">Vault</a>
        <a href="add-entry.html" class="active" aria-current="page">Add</a>
        <a href="settings.html">Settings</a>
        <a href="login.html" id="logout-btn">Logout</a>
    </nav>
    <button type="button" class="nav-burger" id="nav-burger" aria-label="Open menu">
        <i data-lucide="menu"></i>
    </button>
</header>

<div class="nav-drawer" id="nav-drawer">
    <div class="nav-drawer-content">
        <button type="button" class="nav-drawer-close" id="nav-drawer-close" aria-label="Close menu">
            <i data-lucide="x"></i>
        </button>
        <a href="vault.html">Vault</a>
        <a href="add-entry.html" class="active" aria-current="page">Add</a>
        <a href="settings.html">Settings</a>
        <a href="login.html" class="nav-drawer-logout">Logout</a>
    </div>
</div>

<main id="main-content">
    <div class="page-content">
        <h1 class="page-title">Add entry.</h1>
        <div class="add-entry-container">

        <nav class="settings-tabs entry-type-tabs" role="tablist" aria-label="Entry type">
            <button type="button" role="tab" class="settings-tab active" data-type="login" aria-selected="true">Login</button>
            <button type="button" role="tab" class="settings-tab"        data-type="note"  aria-selected="false">Note</button>
            <button type="button" role="tab" class="settings-tab"        data-type="card"  aria-selected="false">Card</button>
        </nav>

        <div class="field">
            <label for="entry-name">Name</label>
            <input type="text" id="entry-name" placeholder="Gmail" autocomplete="off">
        </div>

        <div class="field type-only-login">
            <label for="entry-url">URL</label>
            <input type="text" id="entry-url" placeholder="https://gmail.com" autocomplete="off">
        </div>

        <div class="field type-only-login">
            <label for="entry-username">Username</label>
            <input type="text" id="entry-username" placeholder="example@gmail.com" autocomplete="off">
        </div>

        <div class="field type-only-card">
            <label for="entry-cardholder">Cardholder</label>
            <input type="text" id="entry-cardholder" placeholder="Sawyer Holmes" autocomplete="off">
        </div>

        <div class="field type-only-card">
            <label for="entry-card-number">Card number</label>
            <input type="text" id="entry-card-number" placeholder="4111 1111 1111 1111" autocomplete="off" inputmode="numeric">
        </div>

        <div class="field type-only-card field-row-split">
            <div class="field-row-half">
                <label for="entry-card-expiry">Expiry</label>
                <input type="text" id="entry-card-expiry" placeholder="MM/YY" autocomplete="off" inputmode="numeric">
            </div>
            <div class="field-row-half">
                <label for="entry-card-cvv">CVV</label>
                <input type="text" id="entry-card-cvv" placeholder="123" autocomplete="off" inputmode="numeric">
            </div>
        </div>

        <div class="field type-only-note">
            <label for="entry-content">Content</label>
            <textarea id="entry-content" placeholder="Write your note…" rows="8"></textarea>
        </div>

        <div class="field type-only-login">
            <label for="entry-password">Password</label>
            <div class="password-wrapper">
                <input type="password" id="entry-password" placeholder="••••••••" autocomplete="new-password">
                <button id="toggle-password" class="icon-btn" title="Show/hide" aria-label="Show or hide password">
                    <i data-lucide="eye-off"></i>
                </button>
            </div>

            <!-- Strength indicator -->
            <div class="strength-wrap">
                <div class="strength-bar-wrap">
                    <div class="strength-bar" id="strength-bar"></div>
                </div>
                <div class="strength-label" id="strength-label"></div>
            </div>

            <!-- Generator card -->
            <div class="generator-card">

                <div class="generator-row generator-row-slider">
                    <div class="gen-length-display">
                        <span class="gen-length-value" id="gen-length-label">20</span>
                        <span class="gen-length-unit">chars</span>
                    </div>
                    <div class="slider-track" id="gen-slider">
                        <div class="slider-fill"  id="slider-fill"></div>
                        <div class="slider-thumb" id="slider-thumb"></div>
                    </div>
                </div>

                <div class="generator-row generator-row-controls">
                    <div class="generator-options" role="group" aria-label="Character types">
                        <label class="gen-option">
                            <input type="checkbox" id="gen-upper"   checked> A–Z
                        </label>
                        <label class="gen-option">
                            <input type="checkbox" id="gen-numbers" checked> 0–9
                        </label>
                        <label class="gen-option">
                            <input type="checkbox" id="gen-symbols" checked> !@#
                        </label>
                    </div>
                    <button type="button" id="generate-btn" class="generator-btn">Generate</button>
                </div>

            </div>
        </div>

        <div class="field type-only-login">
            <label for="entry-totp">Two-factor secret (TOTP, optional)</label>
            <input type="text" id="entry-totp" placeholder="JBSWY3DPEHPK3PXP" autocomplete="off" autocapitalize="characters" spellcheck="false">
        </div>

        <div class="field">
            <label for="entry-tags">Tags <span class="label-hint">comma separated</span></label>
            <input type="text" id="entry-tags" placeholder="banking, personal" autocomplete="off">
        </div>

        <div class="field">
            <label for="entry-notes">Notes</label>
            <textarea id="entry-notes" placeholder="Optional notes"></textarea>
        </div>

        <div class="add-entry-actions">
            <button class="btn-black" id="save-entry">Save entry</button>
            <button class="btn-white" id="cancel-entry">Cancel</button>
        </div>

        </div>
    </div>
</main>

<script src="js/lib/icons.js"></script>
<script src="js/lib/nav.js"></script>
<script src="js/lib/toast.js"></script>
<script src="js/lib/sw-register.js"></script>
<script src="js/lib/crypto-utils.js"></script>
<script src="js/lib/totp.js"></script>
<script src="js/lib/sync.js"></script>
<script src="js/lib/auth.js"></script>
<script src="js/pages/add-entry.js"></script>

</body>
</html>
