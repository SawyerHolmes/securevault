<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Entry</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<header>
  <div class="logo">SecureVault</div>
  <nav class="menu">
    <a href="vault.html">Vault</a>
    <a href="add-entry.html">Add Entry</a>
    <a href="settings.html">Settings</a>
    <a href="login.html" id="logout-btn">Logout</a>
  </nav>
</header>

<main>
    <div class="add-entry-container">
        <h2 class="add-entry-title">Add New Entry</h2>

        <div class="field">
            <label for="entry-name">Name</label>
            <input type="text" id="entry-name" placeholder="Gmail Account">
        </div>

        <div class="field">
            <label for="entry-username">Username</label>
            <input type="text" id="entry-username" placeholder="example@gmail.com">
        </div>

        <div class="field">
            <label for="entry-password">Password</label>
            <div class="password-wrapper">
                <input type="password" id="entry-password" placeholder="••••••••">
                <button id="toggle-password" class="icon-btn">
                    <i class="fa-solid fa-eye-slash"></i>
                </button>
            </div>
        </div>

        <div class="field">
            <label for="entry-notes">Notes</label>
            <textarea id="entry-notes" placeholder="No notes"></textarea>
        </div>

        <div class="add-entry-actions">
            <button class="btn-black" id="save-entry">Save</button>
            <button class="btn-white" id="cancel-entry">Cancel</button>
        </div>
    </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script src="js/crypto-utils.js"></script>
<script src="js/add-entry.js"></script>
<script src="js/global-settings.js"></script>

</body>
</html>
