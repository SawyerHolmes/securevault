<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Securevault</title>
    <style>
        :root { color-scheme: dark; }
        html, body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI Variable",
                         "Segoe UI", system-ui, sans-serif;
            font-size: 13px;
            width: 280px;
        }
        .wrap { padding: 16px; }
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #C7F100;
            color: #000;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        h1 {
            margin: 16px 0 4px;
            font-size: 16px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        p {
            color: #888;
            font-size: 12px;
            line-height: 1.5;
            margin: 0 0 16px;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 12px;
        }
        label {
            font-size: 10px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #888;
        }
        input {
            background: transparent;
            border: 1px solid #2C2C2C;
            color: #fff;
            padding: 8px 10px;
            font-size: 13px;
            outline: none;
            font: inherit;
            font-size: 13px;
        }
        input:focus { border-color: #fff; }
        button {
            background: #C7F100;
            color: #000;
            border: none;
            padding: 10px 14px;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            width: 100%;
        }
        button:hover { opacity: 0.85; }
        .status {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-top: 8px;
            min-height: 12px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <span class="logo">■ Securevault</span>
        <h1>Open vault</h1>
        <p>Set the URL of your hosted Securevault instance, then open it in a new tab.</p>

        <div class="field">
            <label for="vault-url">Vault URL</label>
            <input type="url" id="vault-url" placeholder="https://sawyerholmes.github.io/securevault/">
        </div>

        <button id="open-vault">Open vault</button>
        <div id="status" class="status"></div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
