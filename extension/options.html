<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Securevault — Options</title>
    <style>
        :root { color-scheme: dark; }
        html, body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI Variable",
                         "Segoe UI", system-ui, sans-serif;
            font-size: 14px;
        }
        .wrap { max-width: 480px; margin: 64px auto; padding: 0 24px; }
        h1 {
            font-size: 32px;
            font-weight: 500;
            letter-spacing: -0.03em;
            margin: 0 0 16px;
        }
        label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #888;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            background: transparent;
            border: 1px solid #2C2C2C;
            color: #fff;
            padding: 12px 14px;
            font: inherit;
        }
        input:focus { outline: none; border-color: #fff; }
        button {
            margin-top: 16px;
            background: #C7F100;
            color: #000;
            border: none;
            padding: 12px 18px;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
        }
        .status {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #C7F100;
            min-height: 14px;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>Securevault options</h1>
        <label for="vault-url">Vault URL</label>
        <input type="url" id="vault-url" placeholder="https://sawyerholmes.github.io/securevault/">
        <button id="save">Save</button>
        <div id="status" class="status"></div>
    </div>
    <script>
        const input  = document.getElementById("vault-url");
        const save   = document.getElementById("save");
        const status = document.getElementById("status");
        chrome.storage.local.get(["vaultUrl"], r => { if (r.vaultUrl) input.value = r.vaultUrl; });
        save.addEventListener("click", () => {
            chrome.storage.local.set({ vaultUrl: input.value.trim() }, () => {
                status.textContent = "Saved.";
                setTimeout(() => status.textContent = "", 1500);
            });
        });
    </script>
</body>
</html>
