<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureVault</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">SecureVault</div>
  <nav class="menu">
    <a href="vault.html">Vault</a>
    <a href="add-entry.html">Add Entry</a>
    <a href="settings.html">Settings</a>
    <a href="login.html" id="logout-btn">Logout</a>
  </nav>
</header>

<!-- Search Bar + Sort -->
<div class="vault-controls">
  <div class="search-wrapper">

    <!-- Left search icon -->
    <svg class="search-icon" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" fill="none"/>
      <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2"/>
    </svg>

    <!-- Search input -->
    <input type="text" id="search-input" placeholder="Search" autocomplete="off">

    <!-- Right sort icon -->
    <svg class="sort-icon" id="sort-toggle" viewBox="0 0 24 24">
      <line x1="4" y1="6" x2="20" y2="6" stroke="currentColor" stroke-width="2"/>
      <circle cx="10" cy="6" r="2" fill="currentColor"/>

      <line x1="4" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="2"/>
      <circle cx="14" cy="12" r="2" fill="currentColor"/>

      <line x1="4" y1="18" x2="20" y2="18" stroke="currentColor" stroke-width="2"/>
      <circle cx="8" cy="18" r="2" fill="currentColor"/>
    </svg>

    <!-- Sort dropdown menu -->
    <div class="sort-menu" id="sort-menu">
      <div class="sort-field" data-field="name">
        Site Name <span class="indicator"></span>
      </div>
      <div class="sort-field" data-field="username">
        Username <span class="indicator"></span>
      </div>
      <div class="divider"></div>
      <div class="sort-order" data-order="asc">
        Ascending <span class="indicator"></span>
      </div>
      <div class="sort-order" data-order="desc">
        Descending <span class="indicator"></span>
      </div>
    </div>

  </div>
</div>

<!-- Vault Grid -->
<div class="vault-container" id="vault-container"></div>

<!-- Expanded Card Modal -->
<div class="expanded-card" id="expanded-card">
  <div class="expanded-content">
    <div class="expanded-header">
      <h2 id="expanded-name">Entry Name</h2>
      <div class="top-right-buttons">
        <button class="btn-white edit-top" id="edit-btn">
          <i class="fa-solid fa-pen"></i>
        </button>
        <div id="save-cancel-wrapper" style="display:none; gap:4px;">
          <button class="btn-black" id="save-btn">Save</button>
          <button class="btn-white" id="cancel-btn">Cancel</button>
        </div>
      </div>
    </div>

    <div class="expanded-body">
      <div class="field">
        <label>Username</label>
        <div class="value" id="expanded-username">—</div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="password-wrapper">
            <div class="value" id="expanded-password">••••••••</div>
            <button id="toggle-password" class="icon-btn">
            <i class="fa-solid fa-eye-slash"></i>
            </button>
        </div>
      </div>

        <button id="copy-btn" class="btn-white">Copy</button>

      <div class="field">
        <label>Notes</label>
        <div class="value notes" id="expanded-notes">No notes</div>
      </div>

    
    </div>

    <button class="btn-black" id="remove-btn">Remove</button>

  </div>
</div>

<!-- Confirmation Modal -->
<div class="confirmation-overlay" id="confirmation-overlay">
  <div class="confirmation-modal">
    <div id="confirmation-message">Are you sure you want to remove this password?</div>
    <div class="confirmation-buttons">
      <button class="btn-white" id="confirm-yes">Yes</button>
      <button class="btn-black" id="confirm-no">No</button>
    </div>
    <button class="btn-black" id="confirm-close" style="display:none;">Close</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<script src="js/crypto-utils.js"></script>
<script src="js/vault.js"></script>
<script src="js/settings.js"></script>
<script src="js/global-settings.js"></script>

</body>
</html>
