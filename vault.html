<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function() {
            const s = JSON.parse(localStorage.getItem("vaultSettings") || "{}");
            if (s.lightMode !== true) document.documentElement.classList.add("dark");
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureVault — Vault</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23000'/%3E%3Crect x='10' y='10' width='12' height='12' fill='%23C7F100'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <div class="logo">■ Securevault</div>
    <nav class="menu">
        <a href="vault.html" class="active">Vault</a>
        <a href="add-entry.html">Add</a>
        <a href="settings.html">Settings</a>
        <a href="login.html" id="logout-btn">Logout</a>
    </nav>
    <button type="button" class="nav-burger" id="nav-burger" aria-label="Open menu">
        <i data-lucide="menu"></i>
    </button>
</header>

<div class="nav-drawer" id="nav-drawer">
    <div class="nav-drawer-content">
        <button type="button" class="nav-drawer-close" id="nav-drawer-close" aria-label="Close menu">
            <i data-lucide="x"></i>
        </button>
        <a href="vault.html" class="active">Vault</a>
        <a href="add-entry.html">Add</a>
        <a href="settings.html">Settings</a>
        <a href="login.html" class="nav-drawer-logout">Logout</a>
    </div>
</div>

<main>
    <div class="page-content">

        <h1 class="page-title">Vault.</h1>

        <div class="vault-controls">
            <div class="search-wrapper">
                <svg class="search-icon" viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.5" fill="none"/>
                    <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="1.5"/>
                </svg>
                <input type="text" id="search-input" placeholder="Search entries…" autocomplete="off" aria-label="Search vault">
                <button type="button" class="sort-toggle-btn" id="sort-toggle" aria-label="Sort">
                    <svg class="sort-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <line x1="4" y1="6"  x2="20" y2="6"  stroke="currentColor" stroke-width="1.5"/>
                        <circle cx="10" cy="6"  r="2" fill="currentColor"/>
                        <line x1="4" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="1.5"/>
                        <circle cx="14" cy="12" r="2" fill="currentColor"/>
                        <line x1="4" y1="18" x2="20" y2="18" stroke="currentColor" stroke-width="1.5"/>
                        <circle cx="8"  cy="18" r="2" fill="currentColor"/>
                    </svg>
                </button>
                <div class="sort-menu" id="sort-menu">
                    <div class="sort-field" data-field="name">Site name <span class="indicator"></span></div>
                    <div class="sort-field" data-field="username">Username <span class="indicator"></span></div>
                    <div class="divider"></div>
                    <div class="sort-order" data-order="asc">Ascending <span class="indicator"></span></div>
                    <div class="sort-order" data-order="desc">Descending <span class="indicator"></span></div>
                </div>
            </div>
        </div>

        <div id="vault-container"></div>

    </div>
</main>

<!-- Expanded Card Modal -->
<div class="expanded-card" id="expanded-card">
    <div class="expanded-content">

        <div class="expanded-header">
            <h2 id="expanded-name">Entry name</h2>
            <div class="top-right-buttons">
                <button class="btn-white edit-top" id="edit-btn">
                    <i data-lucide="pencil"></i> Edit
                </button>
                <div id="save-cancel-wrapper" style="display:none;">
                    <button class="btn-black" id="save-btn">Save</button>
                    <button class="btn-white" id="cancel-btn">Cancel</button>
                </div>
            </div>
        </div>

        <div class="field" id="url-field">
            <label>URL</label>
            <div class="value url-value" id="expanded-url">—</div>
        </div>

        <div class="field">
            <label>Username</label>
            <div class="value-row">
                <div class="value" id="expanded-username">—</div>
                <button class="icon-btn copy-icon-btn" id="copy-username-btn" title="Copy username" aria-label="Copy username">
                    <i data-lucide="copy"></i>
                </button>
            </div>
        </div>

        <div class="field">
            <label>Password</label>
            <div class="value-row">
                <div class="value" id="expanded-password">••••••••</div>
                <button id="toggle-password" class="icon-btn" title="Show/hide password" aria-label="Show or hide password">
                    <i data-lucide="eye-off"></i>
                </button>
                <button class="icon-btn copy-icon-btn" id="copy-btn" title="Copy password" aria-label="Copy password">
                    <i data-lucide="copy"></i>
                </button>
            </div>
        </div>

        <div class="field">
            <label>Notes</label>
            <div class="value notes" id="expanded-notes">No notes</div>
        </div>

        <div id="expanded-modified"></div>

        <button class="btn-danger" id="remove-btn">Remove entry</button>

    </div>
</div>

<a href="add-entry.html" class="mobile-cta">+ Add entry</a>

<!-- Confirmation Modal -->
<div class="confirmation-overlay" id="confirmation-overlay">
    <div class="confirmation-modal">
        <p id="confirmation-message">Are you sure you want to remove this entry?</p>
        <div class="confirmation-buttons">
            <button class="btn-white" id="confirm-no">Cancel</button>
            <button class="btn-danger" id="confirm-yes">Yes, remove</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="js/icons.js"></script>
<script src="js/nav.js"></script>
<script src="js/toast.js"></script>
<script src="js/crypto-utils.js"></script>
<script src="js/sync.js"></script>
<script src="js/auth.js"></script>
<script src="js/vault.js"></script>

</body>
</html>
