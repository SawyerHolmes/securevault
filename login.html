<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function() {
            const s = JSON.parse(localStorage.getItem("vaultSettings") || "{}");
            if (s.lightMode !== true) document.documentElement.classList.add("dark");
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureVault — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<main>
    <div class="login-container">

        <div>
            <h1 class="login-title">Enter vault.</h1>
            <p class="login-subtitle">Encrypted local · AES-256</p>
        </div>

        <div>
            <label for="master-password">Master password</label>
            <div class="password-wrapper">
                <input
                    type="password"
                    id="master-password"
                    placeholder="••••••••"
                    autocomplete="current-password"
                    autocorrect="off"
                    autocapitalize="off"
                    spellcheck="false">
                <button type="button" id="toggle-password" class="toggle-password" title="Show/hide password" aria-label="Show or hide password">
                    <i data-lucide="eye-off"></i>
                </button>
            </div>
        </div>

        <div id="confirm-password-field" style="display:none;">
            <label for="confirm-master-password">Confirm password</label>
            <div class="password-wrapper">
                <input
                    type="password"
                    id="confirm-master-password"
                    placeholder="••••••••"
                    autocomplete="new-password"
                    autocorrect="off"
                    autocapitalize="off"
                    spellcheck="false">
            </div>
            <p>First-time setup. This password protects your vault. There is no way to recover it.</p>
        </div>

        <div id="login-error" class="login-error"></div>

        <button class="btn-black" id="login-btn">Unlock</button>

        <button class="link-btn" id="reset-btn">Forgot password? Reset vault</button>

    </div>
</main>

<div class="confirmation-overlay" id="reset-overlay">
    <div class="confirmation-modal">
        <p class="confirm-title">Reset vault?</p>
        <p>This permanently deletes all passwords and settings on this device. If you have a Gist backup you can restore it after setting a new password.</p>
        <div class="confirmation-buttons">
            <button id="reset-confirm-yes" class="btn-danger">Yes, wipe everything</button>
            <button id="reset-confirm-no"  class="btn-white">Cancel</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="js/icons.js"></script>
<script src="js/crypto-utils.js"></script>
<script src="js/login.js"></script>

</body>
</html>
