<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureVault — Login</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<header>
    <div class="logo">SecureVault</div>
</header>

<main>
    <div class="login-container">

        <div>
            <h1 class="login-title">Welcome back</h1>
            <p class="login-subtitle">Enter your master password to unlock your vault.</p>
        </div>

        <label for="master-password">Master Password</label>
        <div class="password-wrapper">
            <input
                type="password"
                id="master-password"
                placeholder="••••••••"
                autocomplete="current-password"
                autocorrect="off"
                autocapitalize="off"
                spellcheck="false">
            <button type="button" id="toggle-password" class="toggle-password" title="Show/hide password">
                <i class="fa-solid fa-eye-slash"></i>
            </button>
        </div>

        <button class="btn-black" id="login-btn">Unlock vault</button>

        <div id="login-error" class="login-error"></div>

        <button class="link-btn" id="reset-btn">Forgot password / Reset vault</button>

    </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script src="js/crypto-utils.js"></script>
<script src="js/login.js"></script>

</body>
</html>
