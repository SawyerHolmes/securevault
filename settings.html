<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="JS/crypto-utils.js"></script>
    <script src="JS/sync.js"></script>
    <script defer src="JS/settings.js"></script>
</head>
<body>

<header>
    <div class="logo">SecureVault</div>
    <nav class="menu">
        <a href="vault.html">Vault</a>
        <a href="add-entry.html">Add Entry</a>
        <a href="settings.html">Settings</a>
        <a href="login.html" id="logout-btn">Logout</a>
    </nav>
</header>

<main>
    <div class="settings-container">

        <!-- Account & Security -->
        <h2 class="settings-title">Account & Security</h2>
        <div class="settings-section">

            <div class="setting-item">
                <label for="change-password">Change Master Password</label>
                <input type="password" id="change-password" placeholder="New master password">
            </div>

            <div class="setting-item">
                <label for="confirm-password">Confirm New Password</label>
                <input type="password" id="confirm-password" placeholder="Confirm password">
            </div>

            <div class="setting-item toggle-field">
                <span>Auto-Lock Vault</span>
                <label class="switch">
                    <input type="checkbox" id="auto-lock">
                    <span class="slider"></span>
                </label>
            </div>

        </div>

        <!-- Appearance -->
        <h2 class="settings-title">Appearance</h2>
        <div class="settings-section">

            <div class="setting-item toggle-field">
                <span>Dark Mode</span>
                <label class="switch">
                    <input type="checkbox" id="dark-mode">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="setting-item">
                <label>Vault View</label>
                <div class="segmented-control-3">
                    
                    <input type="radio" name="vault-view" id="view-grid" value="grid" checked>
                    <label for="view-grid">Grid</label>
                    
                    <input type="radio" name="vault-view" id="view-list" value="list">
                    <label for="view-list">List</label>

                    <input type="radio" name="vault-view" id="view-list" value="gallery">
                    <label for="view gallery">Gallery</label>
                  

                    <div class="segmented-slider-3"></div> <!-- Slider must be here -->
                </div>
            </div>

        </div>

        <!-- Preferences -->
        <h2 class="settings-title">Preferences</h2>
        <div class="settings-section">

            <div class="setting-item">
                <label>Default Vault Sort</label>

                <div class="segmented-control-2">

                    <input type="radio" name="default-sort" id="sort-name" value="name" checked>
                    <label for="sort-name">Site Name</label>

                    <input type="radio" name="default-sort" id="sort-username" value="username">
                    <label for="sort-username">Username</label>

                    <div class="segmented-slider-2"></div> <!-- Slider must be here -->
                </div>

            </div>

            <div class="setting-item toggle-field">
                <span>Confirm Before Delete</span>
                <label class="switch">
                    <input type="checkbox" id="confirm-delete">
                    <span class="slider"></span>
                </label>
            </div>

        </div>

        <!-- Sync -->
        <h2 class="settings-title">Sync</h2>
        <div class="settings-section">
        <div class="settings-card">

            <div class="setting-item">
                <label for="github-token">GitHub Personal Access Token</label>
                <input type="password" id="github-token" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
            </div>

            <div class="setting-item">
                <label for="gist-id">Gist ID</label>
                <input type="text" id="gist-id" placeholder="e.g. 4b2c8f1a9d3e7f0c2a1b">
            </div>

            <div class="setting-item" style="flex-direction:row; gap:0.75rem;">
                <button class="btn-black" id="push-btn" style="flex:1">Push to Gist</button>
                <button class="btn-white" id="pull-btn" style="flex:1">Pull from Gist</button>
            </div>

            <div id="sync-status" style="font-size:0.8rem; color:var(--subtext); min-height:1.2em;"></div>

        </div>
        </div>

        <!-- Actions -->
        <div class="settings-actions">
            <button id="save-settings" class="btn-black">Save Settings</button>
            <button id="reset-settings" class="btn-white">Reset Defaults</button>
        </div>

    </div>
</main>

<!-- Confirmation Modal -->
<div class="confirmation-overlay" id="confirmation-overlay">
    <div class="confirmation-modal">
        <p id="confirm-message">Are you sure?</p>
        <div class="confirmation-buttons">
            <button id="confirm-yes" class="btn-black">Confirm</button>
            <button id="confirm-no" class="btn-white">Cancel</button>
        </div>
    </div>
</div>

</body>
</html>
